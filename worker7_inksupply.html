<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nassenger 8 Digital Twin - Worker 7: Ink Supply x8 Channels</title>
<style>
:root {
  --bg: #f5f5f5; --bg2: #ffffff; --bg3: #e8e8e8; --text: #222; --text2: #555;
  --border: #ccc; --accent: #378ADD; --accent2: #BA7517; --accent3: #D85A30; --accent4: #1D9E75;
  --card-bg: #fff; --shadow: 0 2px 8px rgba(0,0,0,0.1);
}
[data-theme="dark"] {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460; --text: #eee; --text2: #aaa;
  --border: #444; --card-bg: #16213e; --shadow: 0 2px 8px rgba(0,0,0,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
.topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.topbar h1 { font-size: 16px; margin-right: auto; }
.btn { padding: 6px 14px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn:hover { background: var(--accent); color: #fff; }
.speed-ctrl { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.speed-ctrl input { width: 80px; }
.layout { display: grid; grid-template-columns: 220px 1fr 260px; gap: 8px; padding: 8px; height: calc(100vh - 48px); }
.left-panel, .right-panel { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.center-panel { display: flex; flex-direction: column; gap: 8px; }
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; box-shadow: var(--shadow); }
.card h3 { font-size: 13px; margin-bottom: 6px; color: var(--text2); }
.slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; }
.slider-row label { flex: 1; }
.slider-row input[type=range] { flex: 2; margin: 0 6px; }
.slider-row .val { width: 50px; text-align: right; font-family: monospace; }
.svg-container { flex: 1; min-height: 200px; }
.svg-container svg { width: 100%; height: 100%; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px; }
.chart-box h4 { font-size: 11px; margin-bottom: 4px; color: var(--text2); }
.chart-box canvas { width: 100%; height: 100px; display: block; }
.formula-chain { font-size: 11px; font-family: monospace; background: var(--bg3); padding: 6px; border-radius: 4px; line-height: 1.6; }
.formula-chain .step { color: var(--accent); font-weight: bold; }
.state-card { font-size: 12px; }
.state-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--border); }
.state-row:last-child { border: none; }
.state-label { color: var(--text2); }
.state-value { font-family: monospace; font-weight: bold; }
.sparkline { width: 100%; height: 30px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>Nassenger 8 - Worker 7: Ink Supply x8 Channels</h1>
  <button class="btn" id="playBtn">Play</button>
  <button class="btn" id="pauseBtn">Pause</button>
  <button class="btn" id="resetBtn">Reset</button>
  <div class="speed-ctrl">
    <label>Speed:</label>
    <input type="range" id="speedSlider" min="1" max="20" value="5">
    <span id="speedVal">5x</span>
  </div>
  <button class="btn" id="themeBtn">Dark</button>
</div>
<div class="layout">
  <div class="left-panel">
    <div class="card">
      <h3>Parameters</h3>
      <div id="sliders"></div>
    </div>
    <div class="card">
      <h3>Formula Chain (8 steps)</h3>
      <div class="formula-chain" id="formulas"></div>
    </div>
  </div>
  <div class="center-panel">
    <div class="card svg-container" id="svgContainer"></div>
    <div class="charts-grid">
      <div class="chart-box"><h4>Tank Volume (L)</h4><canvas id="chart0"></canvas></div>
      <div class="chart-box"><h4>Pump Flow Rate (mL/s)</h4><canvas id="chart1"></canvas></div>
      <div class="chart-box"><h4>Filter Pressure (kPa)</h4><canvas id="chart2"></canvas></div>
      <div class="chart-box"><h4>Channel Balance (kPa)</h4><canvas id="chart3"></canvas></div>
    </div>
  </div>
  <div class="right-panel">
    <div class="card state-card"><h3>State Variables</h3><div id="stateVars"></div></div>
    <div class="card state-card"><h3>Channel Pressures</h3><div id="channelPressures"></div></div>
    <div class="card state-card"><h3>Ink Levels</h3><div id="inkLevels"></div></div>
  </div>
</div>

<script>
const DT = 0.01;
const HIST_LEN = 300;
const SPARK_LEN = 50;
const NUM_CHANNELS = 8;

const PARAM_DEFS = [
  { id: 'tank_volume', label: 'Tank Volume (L)', min: 1, max: 50, val: 20 },
  { id: 'pump_pressure', label: 'Pump Pressure (kPa)', min: 50, max: 500, val: 200 },
  { id: 'filter_resistance', label: 'Filter Resistance', min: 0.1, max: 10, val: 2, step: 0.1 },
  { id: 'subtank_volume', label: 'Subtank Volume (mL)', min: 10, max: 500, val: 100 },
  { id: 'damper_compliance', label: 'Damper Compliance', min: 0.01, max: 1, val: 0.1, step: 0.01 },
  { id: 'ink_viscosity', label: 'Ink Viscosity (mPa·s)', min: 1, max: 50, val: 10 },
  { id: 'pipe_length', label: 'Pipe Length (m)', min: 0.1, max: 5, val: 1, step: 0.1 },
  { id: 'pipe_radius', label: 'Pipe Radius (mm)', min: 0.5, max: 10, val: 3, step: 0.5 }
];

const CHANNEL_COLORS = ['#378ADD','#BA7517','#D85A30','#1D9E75','#9B59B6','#E74C3C','#3498DB','#F39C12'];

let params = {};
PARAM_DEFS.forEach(p => params[p.id] = p.val);

let state = {
  I_env: 0, delta_I: 0, fault_stall: false, fault_overcurrent: false,
  V_tank: params.tank_volume,
  Q_pump: 0, dP_filter: 0, V_sub: params.subtank_volume,
  P_back: 0, level_pct: 100, dP_balance: 0, flow_rate: 0,
  channel_pressures: new Array(NUM_CHANNELS).fill(params.pump_pressure / NUM_CHANNELS),
  history: { V_tank: [], Q_pump: [], dP_filter: [], dP_balance: [] },
  sparklines: { V_tank: [], Q_pump: [], dP_filter: [], dP_balance: [] }
};

let running = false, speed = 5, simTime = 0;

const WORKER_CODE = `
const DT = 0.01;
function compute(p, st, dt) {
  const V0 = p.tank_volume;
  const Q_consumed = st.flow_rate;
  let V_tank = Math.max(0, st.V_tank - Q_consumed * dt);
  let r = p.pipe_radius / 1000;
  let L = p.pipe_length;
  let eta = p.ink_viscosity / 1000;
  let Q_pump = (Math.PI * p.pump_pressure * 1000 * Math.pow(r, 4)) / (8 * eta * L) * 1e6;
  let v_flow = Q_pump / (Math.PI * r * r) / 1e3;
  let dP_filter = (eta * v_flow * L) / (p.filter_resistance * 1e-12) / 1000;
  let Q_in = Q_pump;
  let Q_out = Q_pump * 0.95;
  let V_sub = st.V_sub + (Q_in - Q_out) * dt;
  V_sub = Math.min(p.subtank_volume, Math.max(0, V_sub));
  let C_damper = p.damper_compliance;
  let dP_spike = Math.sin(st.V_tank * 0.1) * 10;
  let delta_V_damper = C_damper * dP_spike;
  let dP_total = dP_filter + Math.abs(dP_spike);
  let P_back = p.pump_pressure - dP_total;
  let V_max = p.tank_volume;
  let level_pct = (V_tank / V_max) * 100;
  let low_flag = level_pct < 15;
  let base_P = p.pump_pressure / NUM_CHANNELS;
  let ch_press = [];
  for (let i = 0; i < NUM_CHANNELS; i++) {
    let variation = Math.sin(st.V_tank * 0.5 + i * 0.8) * 5;
    ch_press.push(base_P + variation);
  }
  let maxP = Math.max(...ch_press);
  let minP = Math.min(...ch_press);
  let dP_balance = maxP - minP;
  
  // ── LAYER A-E: Energy Chain (Sync) ──
  let V_bus = p.V_line * 1.35 - (st.I_load || 0) * p.R_bus;
  let D_pwm = p.V_input ? p.V_input / (p.V_line * 1.35 + 1e-6) : 0.5;
  let V_back_emf = (p.K_e||0.1) * (st.omega || 0);
  
  st.delta_I = (V_bus - V_back_emf) * D_pwm * (1/p.f_sw) / (p.L_motor||0.05);
  st.I_env = ((p.T_load||10) / ((p.K_t||0.1) * p.efficiency));
  if (st.fault_stall) st.I_env *= 2.5;
  if (st.fault_overcurrent) st.I_env *= 1.5;

  return { V_tank, Q_pump, dP_filter, V_sub, P_back: Math.max(0, P_back), level_pct, dP_balance, flow_rate: Q_pump * 0.95, channel_pressures: ch_press };
}
self.onmessage = e => { if (e.data.type === 'step') { let res = compute(e.data.params, e.data.state, DT); self.postMessage({ type: 'result', state: res }); } };
`;

let workers = [];

document.getElementById('chk_stall')?.addEventListener('change', e => state.fault_stall = e.target.checked);
document.getElementById('chk_overcurrent')?.addEventListener('change', e => state.fault_overcurrent = e.target.checked);

function initWorkers() {
  for (let i = 0; i < 4; i++) {
    const blob = new Blob([WORKER_CODE.replace(/NUM_CHANNELS/g, '8')], { type: 'application/javascript' });
    const w = new Worker(URL.createObjectURL(blob));
    w.onmessage = e => { if (e.data.type === 'result') { updateState(e.data.state); } };
    workers.push(w);
  }
}

function stepSimulation() {
  let idx = simTime % workers.length;
  workers[idx].postMessage({ type: 'step', params, state });
}

function updateState(newState) {
  state.V_tank = newState.V_tank;
  state.Q_pump = newState.Q_pump;
  state.dP_filter = newState.dP_filter;
  state.V_sub = newState.V_sub;
  state.P_back = newState.P_back;
  state.level_pct = newState.level_pct;
  state.dP_balance = newState.dP_balance;
  state.flow_rate = newState.flow_rate;
  state.channel_pressures = newState.channel_pressures;
  pushHistory();
  simTime++;
  updateUI();
}

function pushHistory() {
  history.I_signature.push(state.I_env || 0); if(history.I_signature.length>60) history.I_signature.shift();
  ['V_tank','Q_pump','dP_filter','dP_balance'].forEach(k => {
    state.history[k].push(state[k]);
    if (state.history[k].length > HIST_LEN) state.history[k].shift();
    state.sparklines[k].push(state[k]);
    if (state.sparklines[k].length > SPARK_LEN) state.sparklines[k].shift();
  });
}

function buildSliders() {
  const cont = document.getElementById('sliders');
  cont.innerHTML = PARAM_DEFS.map(p => `
    <div class="slider-row">
      <label>${p.label}</label>
      <input type="range" min="${p.min}" max="${p.max}" step="${p.step || 1}" value="${p.val}" data-id="${p.id}">
      <span class="val" data-val="${p.id}">${p.val}</span>
    </div>
  `).join('');
  cont.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      let id = e.target.dataset.id;
      let v = parseFloat(e.target.value);
      params[id] = v;
      cont.querySelector(`[data-val="${id}"]`).textContent = v.toFixed(id === 'filter_resistance' || id === 'damper_compliance' || id === 'pipe_length' || id === 'pipe_radius' ? 2 : 1);
    });
  });
}

function buildFormulas() {
  document.getElementById('formulas').innerHTML = `
    <span class="step">1.</span> V(t) = V0 - Q_consumed*t<br>
    <span class="step">2.</span> Q = pi*dP*r4/(8*eta*L)<br>
    <span class="step">3.</span> dP_filter = mu*v*L/k<br>
    <span class="step">4.</span> dV_sub/dt = Q_in - Q_out<br>
    <span class="step">5.</span> deltaV = C*dP (damper)<br>
    <span class="step">6.</span> P_back = P_supply - dP_total<br>
    <span class="step">7.</span> level% = V/V_max<br>
    <span class="step">8.</span> dP_bal = max(Pi) - min(Pi)<br>
  `;
}

function drawSVG() {
  const svg = `
  <svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="300" fill="${getComputedStyle(document.body).getPropertyValue('--bg2')}"/>
    ${Array.from({length: 8}, (_, i) => {
      let y = 30 + i * 30;
      let c = CHANNEL_COLORS[i];
      return `
        <rect x="10" y="${y}" width="60" height="22" rx="3" fill="${c}" opacity="0.7"/>
        <text x="15" y="${y + 15}" fill="var(--text)" font-size="9">T${i+1}</text>
        <line x1="75" y1="${y+11}" x2="130" y2="${y+11}" stroke="${c}" stroke-width="2"/>
        <rect x="130" y="${y+3}" width="20" height="16" rx="2" fill="#888"/>
        <text x="133" y="${y+14}" fill="#fff" font-size="7">F</text>
        <line x1="155" y1="${y+11}" x2="200" y2="${y+11}" stroke="${c}" stroke-width="2"/>
        <ellipse cx="220" cy="${y+11}" rx="15" ry="8" fill="${c}" opacity="0.5"/>
        <text x="212" y="${y+14}" fill="var(--text)" font-size="7">D${i+1}</text>
        <line x1="240" y1="${y+11}" x2="300" y2="${y+11}" stroke="${c}" stroke-width="2"/>
      `;
    }).join('')}
    <rect x="300" y="20" width="30" height="250" rx="4" fill="#555" opacity="0.6"/>
    <text x="305" y="150" fill="#fff" font-size="10" transform="rotate(-90 315 145)">MANIFOLD</text>
    ${Array.from({length: 8}, (_, i) => {
      let y = 30 + i * 30;
      let c = CHANNEL_COLORS[i];
      let p = state.channel_pressures[i];
      return `<text x="340" y="${y+15}" fill="${c}" font-size="9">${p.toFixed(1)} kPa</text>`;
    }).join('')}
    <rect x="430" y="30" width="80" height="40" rx="4" fill="var(--accent)" opacity="0.3"/>
    <text x="440" y="54" fill="var(--accent)" font-size="10">PUMP</text>
    <rect x="430" y="80" width="80" height="40" rx="4" fill="var(--accent2)" opacity="0.3"/>
    <text x="440" y="104" fill="var(--accent2)" font-size="10">FILTER</text>
    <rect x="430" y="130" width="120" height="50" rx="4" fill="var(--accent4)" opacity="0.3"/>
    <text x="440" y="150" fill="var(--accent4)" font-size="9">Tank: ${state.V_tank.toFixed(1)}L</text>
    <text x="440" y="168" fill="var(--accent4)" font-size="9">Level: ${state.level_pct.toFixed(0)}%</text>
    <rect x="430" y="200" width="120" height="50" rx="4" fill="var(--accent3)" opacity="0.3"/>
    <text x="440" y="220" fill="var(--accent3)" font-size="9">dP Balance: ${state.dP_balance.toFixed(1)}</text>
    <text x="440" y="238" fill="var(--accent3)" font-size="9">Flow: ${state.flow_rate.toFixed(1)} mL/s</text>
  </svg>`;
  document.getElementById('svgContainer').innerHTML = svg;
}


  const sigCanvas = document.getElementById('chart_signature');
  if (sigCanvas && typeof drawChart === 'function' && history.I_signature) {
     drawChart('chart_signature', history.I_signature, '#BA7517');
     const ct_I_sig = document.getElementById('ct_I_sig');
     if (ct_I_sig) ct_I_sig.textContent = (state.I_env || 0).toFixed(2) + ' A';
  }

function drawChart(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * 2;
  canvas.height = h * 2;
  ctx.scale(2, 2);
  ctx.clearRect(0, 0, w, h);
  if (data.length < 2) return;
  let min = Math.min(...data);
  let max = Math.max(...data);
  let range = max - min || 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  data.forEach((v, i) => {
    let x = (i / (HIST_LEN - 1)) * w;
    let y = h - ((v - min) / range) * (h - 10) - 5;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.1;
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawSparkline(containerId, data, color) {
  let cont = document.getElementById(containerId);
  if (!cont) return;
  let svg = `<svg class="sparkline" viewBox="0 0 ${SPARK_LEN} 30">`;
  if (data.length < 2) return;
  let min = Math.min(...data);
  let max = Math.max(...data);
  let range = max - min || 1;
  let pts = data.map((v, i) => `${i},${30 - ((v - min) / range) * 25 - 2.5}`).join(' ');
  svg += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
  svg += `</svg>`;
  cont.innerHTML = svg;
}

function updateStateVars() {
  const vars = [
    { label: 'V_tank', value: state.V_tank.toFixed(2) + ' L' },
    { label: 'Q_pump', value: state.Q_pump.toFixed(2) + ' mL/s' },
    { label: 'dP_filter', value: state.dP_filter.toFixed(2) + ' kPa' },
    { label: 'V_sub', value: state.V_sub.toFixed(1) + ' mL' },
    { label: 'P_back', value: state.P_back.toFixed(1) + ' kPa' },
    { label: 'level%', value: state.level_pct.toFixed(1) + '%' },
    { label: 'dP_balance', value: state.dP_balance.toFixed(2) + ' kPa' },
    { label: 'flow_rate', value: state.flow_rate.toFixed(2) + ' mL/s' }
  ];
  document.getElementById('stateVars').innerHTML = vars.map(v =>
    `<div class="state-row"><span class="state-label">${v.label}</span><span class="state-value">${v.value}</span></div>`
  ).join('');
}

function updateChannelPressures() {
  let html = '';
  for (let i = 0; i < NUM_CHANNELS; i++) {
    html += `<div class="state-row"><span class="state-label" style="color:${CHANNEL_COLORS[i]}">Ch ${i+1}</span><span class="state-value">${state.channel_pressures[i].toFixed(1)} kPa</span></div>`;
  }
  document.getElementById('channelPressures').innerHTML = html;
}

function updateInkLevels() {
  let html = '';
  for (let i = 0; i < NUM_CHANNELS; i++) {
    let lvl = state.level_pct * (0.9 + Math.random() * 0.2);
    let color = lvl > 50 ? 'var(--accent4)' : lvl > 20 ? 'var(--accent2)' : 'var(--accent3)';
    html += `<div class="state-row"><span class="state-label" style="color:${CHANNEL_COLORS[i]}">Tank ${i+1}</span><span class="state-value" style="color:${color}">${lvl.toFixed(0)}%</span></div>`;
  }
  document.getElementById('inkLevels').innerHTML = html;
}

function updateUI() {
  drawSVG();
  drawChart('chart0', state.history.V_tank, '#378ADD');
  drawChart('chart1', state.history.Q_pump, '#BA7517');
  drawChart('chart2', state.history.dP_filter, '#D85A30');
  drawChart('chart3', state.history.dP_balance, '#1D9E75');
  updateStateVars();
  updateChannelPressures();
  updateInkLevels();
}

let simInterval = null;
function startSim() {
  if (simInterval) return;
  simInterval = setInterval(() => { for (let i = 0; i < speed; i++) stepSimulation(); }, 100);
}
function stopSim() { clearInterval(simInterval); simInterval = null; }

document.getElementById('playBtn').onclick = () => { running = true; startSim(); };
document.getElementById('pauseBtn').onclick = () => { running = false; stopSim(); };
document.getElementById('resetBtn').onclick = () => {
  stopSim(); running = false; simTime = 0;
  state.V_tank = params.tank_volume; state.Q_pump = 0; state.dP_filter = 0;
  state.V_sub = params.subtank_volume; state.P_back = 0; state.level_pct = 100;
  state.dP_balance = 0; state.flow_rate = 0;
  state.channel_pressures = new Array(NUM_CHANNELS).fill(params.pump_pressure / NUM_CHANNELS);
  state.history = { V_tank: [], Q_pump: [], dP_filter: [], dP_balance: [] };
  state.sparklines = { V_tank: [], Q_pump: [], dP_filter: [], dP_balance: [] };
  updateUI();
};
document.getElementById('speedSlider').oninput = e => { speed = parseInt(e.target.value); document.getElementById('speedVal').textContent = speed + 'x'; };
document.getElementById('themeBtn').onclick = () => {
  let dark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? 'Dark' : 'Light';
};

buildSliders();
buildFormulas();
initWorkers();
updateUI();
</script>
</body>
</html>
